name: Swift

on:
  push:
    branches: [main]
  pull_request:

env:
  # The plain CommandLineTools toolchain silently builds-but-skips XCTest
  # bundles; pin the full Xcode toolchain so `swift test` actually executes.
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Test
        run: |
          swift test 2>&1 | tee /tmp/swift-test.log
          grep -q "Executed .* tests, with 0 failures" /tmp/swift-test.log
      - name: Self test
        run: swift run localassist-selftest
      - name: Output-quality evals
        run: swift run localassist-eval --min-score 0.9
      - name: Benchmark smoke
        run: |
          swift run localassist-bench --iterations 8 --warmup 1 --concurrency 2 --json --output /tmp/localassist-benchmark.json >/tmp/localassist-benchmark.stdout
          test -s /tmp/localassist-benchmark.json
      - name: Render screenshots
        run: node Tools/Screenshots/render-screenshots.js
