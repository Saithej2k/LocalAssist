name: Swift

on:
  push:
    branches: [main]
  pull_request:

env:
  # The plain CommandLineTools toolchain silently builds-but-skips XCTest
  # bundles; pin the full Xcode toolchain so `swift test` actually executes.
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: SwiftLint
        run: |
          which swiftlint || brew install swiftlint
          swiftlint lint --reporter github-actions-logging
      - name: Test
        run: |
          swift test 2>&1 | tee /tmp/swift-test.log
          grep -q "Executed .* tests, with 0 failures" /tmp/swift-test.log
      - name: Self test
        run: swift run localassist-selftest
      - name: Output-quality evals
        run: swift run localassist-eval --min-score 0.9
      - name: Benchmark smoke
        run: |
          swift run localassist-bench --iterations 8 --warmup 1 --concurrency 2 --json --output /tmp/localassist-benchmark.json >/tmp/localassist-benchmark.stdout
          test -s /tmp/localassist-benchmark.json

  ui-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Generate project
        run: |
          which xcodegen || brew install xcodegen
          xcodegen generate
      - name: UI smoke test
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(dev['udid'] for devs in d['devices'].values() for dev in devs if dev.get('isAvailable') and 'iPhone' in dev['name']))")
          xcodebuild test -project LocalAssist.xcodeproj -scheme LocalAssist \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:LocalAssistUITests 2>&1 | tail -40
          exit "${PIPESTATUS[0]}"
