disabled_rules:
  - trailing_comma

excluded:
  - .build
  - LocalAssist.xcodeproj

line_length:
  warning: 140
  error: 300

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 900
  error: 1200

# The unit-test suite is one intentionally comprehensive class; its length
# is coverage, not complexity.
type_body_length:
  warning: 350
  error: 700
