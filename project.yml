name: LocalAssist

options:
  bundleIdPrefix: com.saithej
  deploymentTarget:
    iOS: "26.0"

packages:
  LocalAssistPackage:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  LocalAssist:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS/LocalAssist
    dependencies:
      - package: LocalAssistPackage
        product: LocalAssistAppUI
      - package: LocalAssistPackage
        product: LocalAssistAppIntents
      - package: LocalAssistPackage
        product: LocalAssistFoundationModels
      - package: LocalAssistPackage
        product: LocalAssistCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saithej.localassist
        INFOPLIST_FILE: Apps/iOS/LocalAssist/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

schemes:
  LocalAssist:
    build:
      targets:
        LocalAssist: all
    run:
      config: Debug
    test:
      config: Debug
