name: LocalAssist

options:
  bundleIdPrefix: com.saithej
  deploymentTarget:
    iOS: "26.0"

packages:
  LocalAssistPackage:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    # Free Personal Team; Xcode mints the development cert on first run.
    DEVELOPMENT_TEAM: PYPWZ3JJ26

targets:
  LocalAssist:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS/LocalAssist
    dependencies:
      - package: LocalAssistPackage
        product: LocalAssistAppUI
      - package: LocalAssistPackage
        product: LocalAssistAppIntents
      - package: LocalAssistPackage
        product: LocalAssistFoundationModels
      - package: LocalAssistPackage
        product: LocalAssistSystemTools
      - package: LocalAssistPackage
        product: LocalAssistCore
      - target: LocalAssistWidgets
        embed: true
      - target: LocalAssistShare
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saithej.localassist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_FILE: Apps/iOS/LocalAssist/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Apps/iOS/LocalAssist/LocalAssist.entitlements
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "4"

  LocalAssistWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS/LocalAssistWidgets
    dependencies:
      - package: LocalAssistPackage
        product: LocalAssistCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saithej.localassist.widgets
        INFOPLIST_FILE: Apps/iOS/LocalAssistWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Apps/iOS/LocalAssistWidgets/LocalAssistWidgets.entitlements
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "4"
        SKIP_INSTALL: YES

  LocalAssistUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS/LocalAssistUITests
    dependencies:
      - target: LocalAssist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saithej.localassist.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LocalAssist
        CODE_SIGN_STYLE: Automatic

  LocalAssistShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS/LocalAssistShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saithej.localassist.share
        INFOPLIST_FILE: Apps/iOS/LocalAssistShare/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Apps/iOS/LocalAssistShare/LocalAssistShare.entitlements
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "4"
        SKIP_INSTALL: YES

schemes:
  LocalAssist:
    build:
      targets:
        LocalAssist: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LocalAssistUITests
